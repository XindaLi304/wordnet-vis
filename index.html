<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1202E5FCQW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-1202E5FCQW');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic WordNet Visualizer</title>
  <!-- FontAwesome for Premium Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Vis-Network Styles -->
  <link href="https://unpkg.com/vis-network/standalone/umd/vis-network.min.css" rel="stylesheet" type="text/css" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- Background Elements for Premium Look -->
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <!-- GitHub Link -->
  <a href="https://github.com/XindaLi304/wordnet-vis" target="_blank" rel="noopener"
    style="position:fixed; top:1rem; right:1rem; z-index:100; color:rgba(255,255,255,0.6); font-size:1.5rem; transition:color 0.2s;"
    onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.6)'"
    title="View source on GitHub">
    <i class="fa-brands fa-github"></i>
  </a>

  <!-- Top Search Bar -->
  <div class="glass-panel search-container">
    <h1><i class="fa-solid fa-diagram-project"></i> WordNet Explorer</h1>
    <p class="subtitle">Discover semantic relationships dynamically</p>
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input type="text" id="searchInput" placeholder="Enter a word (e.g., intelligence)..." autocomplete="off" />
      <button id="searchBtn">Explore</button>
      <button id="resetBtn" title="Reset Graph" style="background: rgba(255,255,255,0.1);"><i
          class="fa-solid fa-rotate-right"></i></button>
    </div>
    <div id="loading" class="hidden">
      <i class="fa-solid fa-circle-notch fa-spin"></i> Fetching semantics...
    </div>
  </div>

  <!-- Vis Network Graph Container -->
  <div id="network-container"></div>

  <!-- Node Info Panel (Hidden by default) -->
  <div class="glass-panel info-panel hidden" id="infoPanel">
    <h2 id="infoTitle">Word</h2>
    <div class="info-badges" id="infoBadges"></div>
    <p class="instruction"><i class="fa-solid fa-mouse-pointer"></i> Double-click to expand semantic network</p>
  </div>

  <!-- Scripts -->
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>

</html>
